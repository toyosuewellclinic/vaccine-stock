<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ワクチン在庫</title>
<style>
*{box-sizing:border-box}
body{margin:8px;padding:0;font-family:sans-serif}
#vsw .upd{font-size:12px;color:#888;text-align:right;margin-bottom:12px}
#vsw .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#27ae60;margin-right:4px;vertical-align:middle}
#vsw h3{font-size:15px;font-weight:bold;margin:20px 0 6px;padding:6px 12px;border-left:4px solid #0066cc;background:#f0f4f8;color:#1a2332}
#vsw table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:8px}
#vsw th{background:#f0f4f8;padding:7px 10px;text-align:left;font-weight:bold;border:1px solid #dde4ec;color:#333}
#vsw td{padding:7px 10px;border:1px solid #dde4ec;vertical-align:middle;word-break:break-all}
#vsw tr:nth-child(even) td{background:#f8fafc}
#vsw .q{text-align:center;font-weight:bold;font-size:14px;white-space:nowrap;min-width:50px}
#vsw .q.out{color:#c0392b}
#vsw .q.low{color:#e67e22}
#vsw .q.ok{color:#27ae60}
</style>
</head>
<body>
<div id="vsw"><p style="color:#888">⏳ 在庫情報を読み込み中...</p></div>
<script>
!function(){
  // ============================================================
  // Supabase 接続設定
  // anon(publishable) key は公開可能。view `public_vaccine_stock` のみ読み取り可。
  // ============================================================
  var SUPABASE_URL = 'https://jgnlzogfnqawtfcvzpzx.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_O6NrECm8YI1750RZoa170g_A0LhiGaU';

  var DOM = [
    {n:'おたふくワクチン',p:'6,600円(税込)'},
    {n:'国産A型肝炎ワクチン(エイムゲン)',p:'16,500円(税込)'},
    {n:'破傷風トキソイド',p:'3,800円(税込)'},
    {n:'3種混合(DPT)ワクチン(トリビック)',p:'8,800円(税込)'},
    {n:'帯状疱疹ワクチン(シングリックス)',p:'22,000円(税込)'},
    {n:'肺炎球菌ワクチン(ニューモバックス)',p:'8,500円(税込)'},
    {n:'水痘・帯状疱疹ワクチン（生ワクチン）',p:'8,400円(税込)'},
    {n:'MRワクチン(ミールビック)',p:'8,800円(税込)'},
    {n:'国産B型肝炎ワクチン(ビームゲン)',p:'6,600円(税込)'},
    {n:'アブリスボ',p:''},
    {n:'プレベナー20',p:''}
  ];
  var IMP = [
    {n:'輸入腸チフスワクチン(Typbar TCV)',p:'11,000円(税込)'},
    {n:'輸入狂犬病ワクチン(ChiroRab)',p:'14,800円(税込)'},
    {n:'輸入A型肝炎ワクチン(Havrix)',p:'8,800円(税込)'},
    {n:'輸入コレラワクチン(DUKORAL)',p:'12,000円(税込)'},
    {n:'輸入3種混合ワクチン（Boostrix）',p:'5,500円(税込)'},
    {n:'輸入日本脳炎ワクチン(JENVAC)',p:'6,600円(税込)'},
    {n:'輸入A型B型肝炎ワクチン(Twinrix)',p:'17,600円(税込)'}
  ];

  function row(c, map) {
    var pd = map[c.n];
    var q = '<span style="color:#bbb">－</span>', cls = '';
    if (pd) {
      if (pd.stock === 0) { cls = 'out'; q = '終了'; }
      else if (pd.stock < pd.min_stock) { cls = 'low'; q = pd.stock + ' ' + (pd.unit || '個'); }
      else { cls = 'ok'; q = pd.stock + ' ' + (pd.unit || '個'); }
    }
    return '<tr><td>' + c.n + '</td><td class="q ' + cls + '">' + q + '</td><td>' + c.p + '</td></tr>';
  }
  function tbl(list, map) {
    var r = '';
    for (var i = 0; i < list.length; i++) r += row(list[i], map);
    return '<table><thead><tr><th>種類</th><th style="text-align:center">在庫</th><th>価格</th></tr></thead><tbody>' + r + '</tbody></table>';
  }

  var w = document.getElementById('vsw');
  var url = SUPABASE_URL + '/rest/v1/public_vaccine_stock'
          + '?select=name,category,stock,min_stock,unit,updated_at';

  fetch(url, {
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Accept': 'application/json'
    },
    cache: 'no-store'
  }).then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }).then(function(rows) {
    var map = {};
    for (var i = 0; i < rows.length; i++) {
      var d = rows[i];
      map[d.name] = d;
    }
    var dt = new Date().toLocaleDateString('ja-JP', {
      year: 'numeric', month: 'long', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    }) + ' 更新';
    w.innerHTML =
        '<div class="upd"><span class="dot"></span>' + dt + '</div>'
      + '<h3>🇯🇵 国産ワクチン</h3>' + tbl(DOM, map)
      + '<h3>✈️ 輸入ワクチン</h3>' + tbl(IMP, map);
    try {
      window.parent.postMessage({ iframeHeight: document.body.scrollHeight + 20 }, '*');
    } catch (e) {}
  }).catch(function(err) {
    w.innerHTML = '<p style="color:red">⚠️ 読み込みエラー: ' + err.message + '</p>';
  });
}();
</script>
</body>
</html>
